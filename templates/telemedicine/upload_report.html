{% extends 'base.html' %}

{% block content %}
<div class="row justify-content-center mt-5">
    <div class="col-lg-6">
        <div class="card shadow-lg border-0 rounded-4 overflow-hidden">
            <div class="card-header bg-accent text-white p-4 text-center">
                <div class="mb-2"><i class="bi bi-file-earmark-medical-fill fs-1"></i></div>
                <h3 class="mb-0 fw-bold">Upload Laboratory Report</h3>
                <p class="mb-0 text-white-50">Upload your test results for doctor review</p>
            </div>
            <div class="card-body p-5">
                <form method="POST" enctype="multipart/form-data">
                    {% csrf_token %}
                    <div class="mb-4">
                        <label for="title" class="form-label fw-bold small text-uppercase text-muted">Report Title</label>
                        <input type="text" class="form-control form-control-lg shadow-sm" id="title" name="title" placeholder="e.g., Malaria Test Results - April 2026" required>
                    </div>
                    
                    <div class="mb-4">
                        <label for="file" class="form-label fw-bold small text-uppercase text-muted">Laboratory File (PDF or Image)</label>
                        <div class="input-group shadow-sm">
                            <input type="file" class="form-control form-control-lg" id="file" name="file" required>
                        </div>
                        <div class="form-text mt-2"><i class="bi bi-info-circle me-1"></i> Supported formats: PDF, JPG, PNG. Max size: 10MB.</div>
                    </div>

                    <div class="mb-5">
                        <label for="description" class="form-label fw-bold small text-uppercase text-muted">Description (Optional)</label>
                        <textarea class="form-control shadow-sm" id="description" name="description" rows="3" placeholder="Provide any additional context or notes from the laboratory..."></textarea>
                    </div>
                    
                    <div class="d-grid gap-2">
                        <button type="submit" class="btn btn-main btn-lg fw-bold py-3 shadow">
                            <i class="bi bi-cloud-arrow-up me-2"></i> Submit Laboratory Report
                        </button>
                        <a href="{% url 'patient_dashboard' %}" class="btn btn-link text-muted">Cancel and Go Back</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
