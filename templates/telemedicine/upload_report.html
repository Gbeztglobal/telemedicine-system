{% extends 'base.html' %}

{% block content %}
<div class="container py-4 animate-fade-in">
    <div class="row justify-content-center">
        <div class="col-lg-6">
            <!-- Bicolor TeleMD Card (Navy Header / White Body) -->
            <div class="telemd-card p-0 border-0 shadow-lg overflow-hidden" style="border-radius: 2rem;">
                
                <!-- Navy Header Section -->
                <div class="bg-telemd-navy py-5 text-center text-white">
                    <div class="mb-3 d-inline-block">
                        <i class="bi bi-file-earmark-medical fs-1"></i>
                    </div>
                    <h2 class="fw-bold mb-0">Lab Report Upload</h2>
                    <p class="text-white-50 small mt-2">Securely transmit your clinical documents.</p>
                </div>
                
                <!-- White Body Section -->
                <div class="p-5 bg-white">
                    <form method="POST" enctype="multipart/form-data">
                        {% csrf_token %}
                        <div class="mb-4 text-center p-5 border-2 border-dashed border-light rounded-4 bg-light mb-5">
                            <i class="bi bi-cloud-arrow-up fs-1 text-muted opacity-50 mb-3 d-block"></i>
                            <label for="report" class="btn btn-outline-dark fw-bold rounded-pill px-4">Choose File</label>
                            <input type="file" id="report" name="report_file" class="d-none" required>
                            <p class="text-muted small mt-3 mb-0">PDF, JPG, or PNG (Max 10MB)</p>
                        </div>

                        <div class="p-3 fs-7 rounded-3 d-flex align-items-center mb-5" style="background: rgba(0, 166, 140, 0.05); color: var(--telemd-teal); border: 1px solid rgba(0, 166, 140, 0.1);">
                            <i class="bi bi-shield-lock-fill me-2 fs-5"></i>
                            <div class="small fw-bold">Encrypted Clinical Transmission Active</div>
                        </div>

                        <button type="submit" class="btn btn-telemd-navy w-100 py-3 shadow-sm d-flex align-items-center justify-content-center">
                            <i class="bi bi-upload me-2"></i> Start Secure Upload
                        </button>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>

<style>
    .border-dashed { border-style: dashed !important; }
</style>
{% endblock %}
