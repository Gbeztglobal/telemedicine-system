{% extends 'base.html' %}

{% block content %}
<div class="row justify-content-center mt-4">
    <div class="col-md-8">
        <div class="card p-4">
            <h3 class="theme-header text-center"><i class="bi bi-robot"></i> AI Auto-Diagnosis</h3>
            <p class="text-muted text-center">Analyze your symptoms to check for Malaria or Cholera risks.</p>
            
            <form method="POST">
                {% csrf_token %}
                <div class="mb-4">
                    <label class="form-label fw-bold">Describe your symptoms (Please be detailed) <span class="text-danger">*</span></label>
                    <textarea class="form-control" name="symptoms" rows="4" required placeholder="e.g., I have been experiencing severe diarrhea, vomiting, and feel very dehydrated..."></textarea>
                </div>
                
                <div class="mb-4">
                    <label class="form-label fw-bold">Previous Prescriptions / Medications taken (Optional)</label>
                    <textarea class="form-control" name="prescriptions" rows="2" placeholder="e.g., Paracetamol, ORS..."></textarea>
                </div>
                
                <div class="d-grid gap-2">
                    <button type="submit" class="btn btn-main fw-bold"><i class="bi bi-search"></i> Run Diagnosis Engine</button>
                    <a href="{% url 'dashboard' %}" class="btn btn-outline-secondary">Cancel</a>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
