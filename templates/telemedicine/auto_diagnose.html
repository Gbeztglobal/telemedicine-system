{% extends 'base.html' %}

{% block content %}
<div class="row justify-content-center mt-4">
    <div class="col-lg-10 col-xl-9">
        <div class="telemd-card p-0 overflow-hidden border-0 shadow-lg">
            <!-- TeleMD Navy Header -->
            <div class="bg-telemd-navy p-5 text-center text-white">
                <div class="mb-3 d-inline-block p-4 rounded-circle" style="background: rgba(255, 255, 255, 0.05);">
                    <i class="bi bi-robot fs-1"></i>
                </div>
                <h2 class="fw-bold mb-1">AI Diagnosis Engine</h2>
                <p class="text-white-50 mb-0">Anatomical Triage & Risk Evaluation</p>
            </div>
            
            <div class="card-body p-4 p-md-5">
                <div class="row g-5">
                    <!-- Anatomical Map Col -->
                    <div class="col-md-5 text-center border-md-end">
                        <h6 class="fw-bold text-muted text-uppercase mb-4 smaller ls-wide">1. Tap Pain Areas</h6>
                        <div class="body-map-container mx-auto mb-4" style="max-width: 200px;">
                            <svg viewBox="0 0 100 200" class="w-100 h-auto body-svg">
                                <path class="body-part" id="part-head" d="M50,10c5,0,10,5,10,12s-5,12-10,12s-10-5-10-12s5-12,10-12" data-symptom="Severe Headache, Fever" />
                                <path class="body-part" id="part-chest" d="M35,38h30l5,40h-40l5-40" data-symptom="Fatigue, Body Pain" />
                                <path class="body-part" id="part-stomach" d="M40,80h20l3,30l-26,0l3-30" data-symptom="Severe Diarrhea, Nausea" />
                                <path class="body-part" id="part-joints" d="M30,40l-15,40m55-40l15,40M35,110l-5,70m40-70l5,70" data-symptom="Joint Pain, Muscle Weakness" />
                            </svg>
                        </div>
                        <p class="smallest text-muted italic">Clinical triage is suggesting based on anatomical selection.</p>
                    </div>

                    <!-- Input Col -->
                    <div class="col-md-7">
                        <form id="diagnosisForm" method="POST">
                            {% csrf_token %}
                            
                            <div class="mb-4">
                                <label class="form-label fw-bold text-dark d-flex align-items-center small text-uppercase ls-wide mb-3">
                                    <i class="bi bi-person-lines-fill me-2" style="color: var(--telemd-navy);"></i> 
                                    2. Symptom Breakdown
                                </label>
                                
                                <div id="symptom-badges" class="d-flex flex-wrap gap-2 mb-4">
                                    <button type="button" class="btn btn-outline-secondary btn-sm rounded-pill symptom-chip" data-symptom="Severe Fever">Fever</button>
                                    <button type="button" class="btn btn-outline-secondary btn-sm rounded-pill symptom-chip" data-symptom="Severe Headache">Headache</button>
                                    <button type="button" class="btn btn-outline-secondary btn-sm rounded-pill symptom-chip" data-symptom="Severe Diarrhea">Diarrhea</button>
                                    <button type="button" class="btn btn-outline-secondary btn-sm rounded-pill symptom-chip" data-symptom="Nausea & Vomiting">Vomiting</button>
                                    <button type="button" class="btn btn-outline-secondary btn-sm rounded-pill symptom-chip" data-symptom="Body Pain">Body Pain</button>
                                </div>

                                <textarea id="symptomsField" class="form-control rounded-4 bg-light border-0 p-4 shadow-none mt-2" name="symptoms" rows="4" required placeholder="Describe your condition here..."></textarea>
                            </div>
                            
                            <div id="loadingState" class="text-center d-none py-4">
                                <div class="spinner-border mb-3" style="color: var(--telemd-teal);" role="status"></div>
                                <h6 class="fw-bold" style="color: var(--telemd-navy);">Executing Clinical Analysis...</h6>
                            </div>

                            <div id="actionButtons" class="d-grid gap-3">
                                <button type="submit" class="btn btn-telemd-navy btn-lg fw-bold py-3 shadow-lg">
                                    <i class="bi bi-shield-check me-2"></i> Run AI Evaluation
                                </button>
                                <a href="{% url 'dashboard' %}" class="btn btn-link text-muted fw-bold btn-sm text-decoration-none">Cancel and Return</a>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<style>
    .body-part { fill: #e2e8f0; stroke: #cbd5e1; stroke-width: 1; cursor: pointer; transition: all 0.3s; }
    .body-part:hover { fill: var(--telemd-teal) !important; opacity: 0.8; }
    .body-part.active { fill: var(--telemd-teal) !important; filter: drop-shadow(0 0 5px var(--telemd-teal)); stroke: white; }
    
    .symptom-chip { transition: all 0.2s; font-size: 0.75rem; font-weight: 600; border-color: #e2e8f0; color: #64748b; }
    .symptom-chip.active { background-color: var(--telemd-navy) !important; color: white !important; border-color: var(--telemd-navy); }
    .ls-wide { letter-spacing: 0.05em; }
</style>

<script>
    const field = document.getElementById('symptomsField');
    const chips = document.querySelectorAll('.symptom-chip');
    const parts = document.querySelectorAll('.body-part');

    parts.forEach(part => {
        part.addEventListener('click', function() {
            this.classList.toggle('active');
            const dataSymptom = this.dataset.symptom;
            chips.forEach(chip => {
                if (dataSymptom.includes(chip.innerText)) {
                    if (this.classList.contains('active')) {
                        if (!chip.classList.contains('active')) chip.click();
                    }
                }
            });
        });
    });

    chips.forEach(chip => {
        chip.addEventListener('click', function() {
            this.classList.toggle('active');
            const val = this.dataset.symptom;
            if (this.classList.contains('active')) {
                const currentVal = field.value.trim();
                field.value = (currentVal ? currentVal + ', ' : '') + val;
            } else {
                field.value = field.value.replace(val, '').replace(/,\s*,/, ',').replace(/^,\s*/, '').replace(/,\s*$/, '').trim();
            }
        });
    });

    document.getElementById('diagnosisForm').onsubmit = function() {
        document.getElementById('actionButtons').classList.add('d-none');
        document.getElementById('loadingState').classList.remove('d-none');
    };
</script>
{% endblock %}
