{% extends 'base.html' %}
{% block content %}
<!-- FORCE SYNC -->
<div class="row">
    <div class="col-lg-8">
        <h4 class="theme-header"><i class="bi bi-journal-medical me-2"></i> Recent Assessments</h4>
        {% if diagnoses %}
            <div class="row g-3 mb-5">
                {% for d in diagnoses %}
                <div class="col-md-6">
                    <div class="card p-3 shadow-sm border-0 border-top border-4 {% if d.malaria_risk == 'High' or d.cholera_risk == 'High' %}border-danger{% else %}border-success{% endif %}">
                        <h6 class="fw-bold">{{ d.created_at|date:"M d, Y" }}</h6>
                        <p class="small text-muted">{{ d.symptoms|truncatechars:80 }}</p>
                    </div>
                </div>
                {% endfor %}
            </div>
        {% else %}
            <div class="card p-4 text-center"><p class="text-muted">No assessments yet.</p></div>
        {% endif %}
    </div>
</div>
{% endblock %}
