{% extends 'base.html' %}

{% block content %}
<div class="container py-5">
    <div class="row justify-content-center align-items-center" style="min-height: 70vh;">
        <div class="col-md-5">
            <div class="telemd-card p-5 text-center shadow-lg border-0" style="border-radius: 2rem;">
                
                <!-- Secure Shield Lock Icon -->
                <div class="mb-4 d-inline-block p-4 rounded-circle" style="background: rgba(0, 44, 75, 0.03);">
                    <i class="bi bi-shield-lock-fill fs-1" style="color: var(--telemd-navy); opacity: 0.15;"></i>
                </div>
                
                <h2 class="fw-bold mb-5" style="color: var(--telemd-navy); letter-spacing: -0.02em;">Secure Login</h2>

                <form method="POST" class="text-start">
                    {% csrf_token %}
                    
                    <div class="mb-4">
                        <label class="form-label small fw-bold text-uppercase ms-1" style="color: #64748b; letter-spacing: 0.05em;">Username</label>
                        <input type="text" name="username" class="form-control form-control-lg px-3 py-3" 
                               style="border-radius: 12px; border: 1.5px solid #e2e8f0; font-size: 1rem;" required>
                    </div>

                    <div class="mb-5">
                        <label class="form-label small fw-bold text-uppercase ms-1" style="color: #64748b; letter-spacing: 0.05em;">Password</label>
                        <input type="password" name="password" class="form-control form-control-lg px-3 py-3" 
                               style="border-radius: 12px; border: 1.5px solid #e2e8f0; font-size: 1rem;" required>
                    </div>

                    <button type="submit" class="btn btn-telemd-navy w-100 py-3 d-flex align-items-center justify-content-center shadow" style="border-radius: 12px;">
                        <i class="bi bi-door-open-fill me-2 fs-5"></i> Log In
                    </button>
                </form>

                <div class="mt-5 pt-3 border-top">
                    <p class="small text-muted mb-0">Need a medical account? <a href="{% url 'register' %}" class="fw-bold text-decoration-none" style="color: var(--telemd-teal);">Register here</a></p>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
