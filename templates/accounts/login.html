{% extends 'base.html' %}

{% block content %}
<div class="container py-5">
    <div class="row justify-content-center align-items-center" style="min-height: 75vh;">
        <div class="col-md-5">
            <!-- Bicolor TeleMD Card (Navy Header / White Body) -->
            <div class="telemd-card p-0 border-0 shadow-lg overflow-hidden" style="border-radius: 2rem;">
                
                <!-- Navy Header Section -->
                <div class="bg-telemd-navy py-5 text-center text-white">
                    <div class="mb-3 d-inline-block">
                        <i class="bi bi-shield-lock-fill fs-1"></i>
                    </div>
                    <h2 class="fw-bold mb-0" style="letter-spacing: -0.02em;">Secure Login</h2>
                </div>
                
                <!-- White Body Section -->
                <div class="p-5 bg-white">
                    <form method="POST" class="text-start">
                        {% csrf_token %}
                        
                        <div class="mb-4">
                            <label class="form-label small fw-bold text-uppercase ms-1" style="color: #64748b; letter-spacing: 0.05em;">Username</label>
                            <input type="text" name="username" class="form-control form-control-lg px-3 py-3" 
                                   style="border-radius: 8px; border: 1.5px solid #e2e8f0; font-size: 1rem;" required>
                        </div>

                        <div class="mb-5">
                            <label class="form-label small fw-bold text-uppercase ms-1" style="color: #64748b; letter-spacing: 0.05em;">Password</label>
                            <input type="password" name="password" class="form-control form-control-lg px-3 py-3" 
                                   style="border-radius: 8px; border: 1.5px solid #e2e8f0; font-size: 1rem;" required>
                        </div>

                        <button type="submit" class="btn btn-telemd-navy w-100 py-3 d-flex align-items-center justify-content-center shadow-sm mb-4" 
                                style="border-radius: 12px; font-size: 1.1rem;">
                            <i class="bi bi-door-open-fill me-2"></i> Log In
                        </button>
                    </form>

                    <div class="text-center mt-2">
                        <p class="small text-muted mb-0">Need a medical account? <a href="{% url 'register' %}" class="fw-bold text-decoration-none border-bottom border-2 border-telemd-navy pb-1" style="color: var(--telemd-navy);">Register here</a></p>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
