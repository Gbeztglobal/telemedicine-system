{% extends 'base.html' %}

{% block content %}
<div class="container py-4 animate-fade-in">
    <div class="row justify-content-center">
        <div class="col-lg-8">
            <!-- Bicolor TeleMD Card (Navy Header / White Body) -->
            <div class="telemd-card p-0 border-0 shadow-lg overflow-hidden" style="border-radius: 2rem;">
                
                <!-- Navy Header Section -->
                <div class="bg-telemd-navy py-5 text-center text-white">
                    <div class="mb-3 d-inline-block">
                        <i class="bi bi-person-badge fs-1"></i>
                    </div>
                    <h2 class="fw-bold mb-0" style="letter-spacing: -0.01em;">Medical Profile</h2>
                    <p class="text-white-50 small mt-2">Manage your clinical identity and credentials.</p>
                </div>
                
                <!-- White Body Section -->
                <div class="p-5 bg-white">
                    <form method="POST" enctype="multipart/form-data">
                        {% csrf_token %}
                        
                        <div class="row g-4 mb-4 text-center text-md-start">
                            <div class="col-md-3">
                                <div class="profile-avatar-container mx-auto">
                                    <img src="{{ user.avatar_url }}" class="rounded-circle border border-4 border-light shadow-sm" width="120" height="120" style="object-fit:cover;">
                                    <span class="status-dot"></span>
                                </div>
                                <div class="mt-3">
                                    <label for="avatar" class="btn btn-outline-dark btn-sm rounded-pill fw-bold">Change Photo</label>
                                    <input type="file" id="avatar" name="avatar" class="d-none">
                                </div>
                            </div>
                            <div class="col-md-9 pt-3">
                                <h4 class="fw-bold mb-1">{{ user.get_full_name }}</h4>
                                <p class="text-muted small mb-3">System UID: #{{ user.id }} • {{ user.get_role_display }}</p>
                                <span class="badge rounded-pill bg-light border text-telemd-navy px-3 py-2 fw-semibold">
                                    <i class="bi bi-patch-check-fill me-1"></i> Verified Healthcare User
                                </span>
                            </div>
                        </div>

                        <hr class="my-5 opacity-10">

                        <div class="row g-4">
                            <div class="col-md-6 text-start">
                                <label class="form-label small fw-bold text-uppercase ms-1" style="color: #64748b; letter-spacing: 0.05em;">Phone Number</label>
                                <input type="text" name="phone_number" value="{{ user.phone_number }}" class="form-control form-control-lg px-3" style="border-radius: 12px; border: 1.5px solid #e2e8f0;">
                            </div>
                            <div class="col-md-6 text-start">
                                <label class="form-label small fw-bold text-uppercase ms-1" style="color: #64748b; letter-spacing: 0.05em;">Email Address</label>
                                <input type="email" name="email" value="{{ user.email }}" class="form-control form-control-lg px-3" style="border-radius: 12px; border: 1.5px solid #e2e8f0;">
                            </div>
                        </div>

                        <button type="submit" class="btn btn-telemd-navy w-100 py-3 mt-5 d-flex align-items-center justify-content-center shadow-sm">
                            <i class="bi bi-check2-circle me-2"></i> Update Medical Identity
                        </button>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>

<style>
    .animate-fade-in { animation: fadeIn 0.6s ease-out; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
</style>
{% endblock %}
