{% extends 'base.html' %}

{% block content %}
<div class="container-fluid h-100 mt-2">
    <div class="row h-100">
        <!-- Main Call Area -->
        <div class="col-lg-9 h-100">
            <div class="card shadow-lg border-0 rounded-4 overflow-hidden position-relative bg-dark" style="height: 85vh;">
                <!-- Remote Video (Full Screen) -->
                <video id="remoteVideo" autoplay playsinline class="w-100 h-100" style="object-fit: cover; background: #1a1a1a;"></video>
                
                <!-- Local Video (Picture-in-Picture) -->
                <div class="position-absolute bottom-0 end-0 m-4 shadow-lg border border-3 border-white rounded-4 overflow-hidden" style="width: 240px; height: 160px; z-index: 10;">
                    <video id="localVideo" autoplay muted playsinline class="w-100 h-100" style="object-fit: cover; background: #333; transform: scaleX(-1);"></video>
                </div>

                <!-- Call Controls Overlay -->
                <div class="position-absolute bottom-0 start-50 translate-middle-x mb-4 d-flex gap-3 px-4 py-2 bg-dark bg-opacity-50 rounded-pill backdrop-blur" style="z-index: 20;">
                    <button id="toggleMic" class="btn btn-light rounded-circle p-3 d-flex align-items-center justify-content-center" style="width: 55px; height: 55px;">
                        <i class="bi bi-mic-fill fs-4"></i>
                    </button>
                    <button id="toggleCamera" class="btn btn-light rounded-circle p-3 d-flex align-items-center justify-content-center" style="width: 55px; height: 55px;">
                        <i class="bi bi-camera-video-fill fs-4"></i>
                    </button>
                    <button id="hangUp" class="btn btn-danger rounded-circle p-3 d-flex align-items-center justify-content-center shadow-lg" style="width: 60px; height: 60px;">
                        <i class="bi bi-telephone-x-fill fs-3"></i>
                    </button>
                </div>

                <!-- Status Overlay -->
                <div id="callStatus" class="position-absolute top-0 start-50 translate-middle-x mt-4 badge bg-dark bg-opacity-75 px-4 py-2 rounded-pill fw-normal" style="z-index: 20;">
                    <i class="bi bi-shield-check text-success me-2"></i> Connecting to Dr. {{ target_user.last_name }}...
                </div>
            </div>
        </div>

        <!-- Call Sidebar -->
        <div class="col-lg-3">
            <div class="card border-0 shadow-sm rounded-4 p-4 text-center mb-4">
                <div class="mb-3">
                    <img src="{{ target_user.avatar_url }}" class="rounded-circle shadow border border-3 border-main-theme" width="100" height="100" style="object-fit:cover;">
                </div>
                <h5 class="fw-bold mb-1">{{ target_user.first_name }} {{ target_user.last_name }}</h5>
                <p class="text-muted small mb-0">{{ target_user.get_role_display }}</p>
                <hr class="my-4 opacity-10">
                <div class="alert alert-info border-0 rounded-4 small py-3">
                    <i class="bi bi-info-circle-fill me-2"></i> <strong>Tip:</strong> Ensure your camera and microphone are permitted in your browser settings.
                </div>
            </div>
        </div>
    </div>
</div>

<style>
    .backdrop-blur {
        backdrop-filter: blur(10px);
        -webkit-backdrop-filter: blur(10px);
    }
    video {
        border-radius: inherit;
    }
</style>

<script>
    const targetUserId = "{{ target_user.id }}";
    const currentUserId = "{{ request.user.id }}";
    const wsScheme = window.location.protocol === "https:" ? "wss" : "ws";
    const callSocket = new WebSocket(`${wsScheme}://${window.location.host}/ws/call/`);

    let localStream;
    let peerConnection;
    const config = {
        iceServers: [{ urls: 'stun:stun.l.google.com:19302' }]
    };

    const localVideo = document.getElementById('localVideo');
    const remoteVideo = document.getElementById('remoteVideo');
    const callStatus = document.getElementById('callStatus');

    async function init() {
        try {
            localStream = await navigator.mediaDevices.getUserMedia({ video: true, audio: true });
            localVideo.srcObject = localStream;
            
            // Auto-start negotiation if we are the caller (for demo simplicity)
            // In a better flow, we'd wait for both to be "ready"
            createPeerConnection();
            localStream.getTracks().forEach(track => peerConnection.addTrack(track, localStream));
            
            const offer = await peerConnection.createOffer();
            await peerConnection.setLocalDescription(offer);
            
            callSocket.send(JSON.stringify({
                'action': 'offer',
                'target_id': targetUserId,
                'payload': offer
            }));
            
            callStatus.innerHTML = '<span class="text-warning"><i class="bi bi-activity me-2"></i> Waiting for answer...</span>';
        } catch (err) {
            console.error("Camera access error:", err);
            callStatus.innerHTML = '<span class="text-danger"><i class="bi bi-exclamation-triangle-fill me-2"></i> Camera Access Denied</span>';
        }
    }

    function createPeerConnection() {
        peerConnection = new RTCPeerConnection(config);
        
        peerConnection.onicecandidate = event => {
            if (event.candidate) {
                callSocket.send(JSON.stringify({
                    'action': 'candidate',
                    'target_id': targetUserId,
                    'payload': event.candidate
                }));
            }
        };

        peerConnection.ontrack = event => {
            remoteVideo.srcObject = event.streams[0];
            callStatus.innerHTML = '<span class="text-success"><i class="bi bi-check-circle-fill me-2"></i> Connected Room</span>';
        };

        peerConnection.onconnectionstatechange = () => {
            if (peerConnection.connectionState === 'connected') {
                callStatus.innerHTML = '<span class="text-success"><i class="bi bi-broadcast me-2"></i> Encrypted Session Active</span>';
            }
        };
    }

    callSocket.onmessage = async (e) => {
        const data = JSON.parse(e.data);
        const action = data.action;
        const payload = data.payload;

        if (action === 'offer') {
            if (!peerConnection) createPeerConnection();
            await peerConnection.setRemoteDescription(new RTCSessionDescription(payload));
            
            const answer = await peerConnection.createAnswer();
            await peerConnection.setLocalDescription(answer);
            
            callSocket.send(JSON.stringify({
                'action': 'answer',
                'target_id': targetUserId,
                'payload': answer
            }));
        } else if (action === 'answer') {
            await peerConnection.setRemoteDescription(new RTCSessionDescription(payload));
        } else if (action === 'candidate') {
            if (peerConnection) {
                await peerConnection.addIceCandidate(new RTCIceCandidate(payload));
            }
        }
    };

    // Controls
    document.getElementById('toggleMic').onclick = () => {
        const audioTrack = localStream.getAudioTracks()[0];
        audioTrack.enabled = !audioTrack.enabled;
        document.getElementById('toggleMic').classList.toggle('btn-danger');
        document.getElementById('toggleMic').classList.toggle('btn-light');
    };

    document.getElementById('toggleCamera').onclick = () => {
        const videoTrack = localStream.getVideoTracks()[0];
        videoTrack.enabled = !videoTrack.enabled;
        document.getElementById('toggleCamera').classList.toggle('btn-danger');
        document.getElementById('toggleCamera').classList.toggle('btn-light');
    };

    document.getElementById('hangUp').onclick = () => {
        window.history.back();
    };

    init();
</script>
{% endblock %}
