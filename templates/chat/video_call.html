{% extends 'base.html' %}

{% block content %}
<div class="whatsapp-video-container">
    <video id="remoteVideo" autoplay playsinline class="remote-video"></video>
    <div class="video-overlay"></div>

    <div class="top-info">
        <div class="d-flex align-items-center">
            <button onclick="window.history.back()" class="btn btn-link text-white me-3 p-0"><i class="bi bi-chevron-left fs-3"></i></button>
            <img src="{{ target_user.avatar_url }}" class="rounded-circle border border-2 border-white shadow" width="45" height="45" style="object-fit:cover;">
            <div class="ms-3">
                <h5 class="mb-0 text-white fw-bold">Dr. {{ target_user.last_name }}</h5>
                <div id="callStatus" class="small text-white-50">End-to-end encrypted</div>
            </div>
        </div>
    </div>

    <div class="local-v-pip shadow-lg" id="localPip">
        <video id="localVideo" autoplay muted playsinline></video>
    </div>

    <div class="bottom-controls">
        <button id="toggleMic" class="control-circle"><i class="bi bi-mic-fill"></i></button>
        <button id="toggleCamera" class="control-circle"><i class="bi bi-camera-video-fill"></i></button>
        <button id="hangUp" class="control-circle hangup"><i class="bi bi-telephone-x-fill"></i></button>
    </div>
</div>

<script>
    const targetUserId = "{{ target_user.id }}";
    const localVideo = document.getElementById('localVideo');
    const remoteVideo = document.getElementById('remoteVideo');
    let peerConnection;
    let localStream;

    async function init() {
        localStream = await navigator.mediaDevices.getUserMedia({ video: true, audio: true });
        localVideo.srcObject = localStream;
        // ... (rest of WebRTC logic)
    }

    document.getElementById('hangUp').onclick = () => window.history.back();

    // VIEW SWAP LOGIC (WhatsApp Style)
    let isSwapped = false;
    document.getElementById('localPip').onclick = () => {
        isSwapped = !isSwapped;
        const localObj = localVideo.srcObject;
        const remoteObj = remoteVideo.srcObject;
        localVideo.srcObject = remoteObj;
        remoteVideo.srcObject = localObj;
        
        if (isSwapped) {
            remoteVideo.style.transform = 'scaleX(-1)';
            localVideo.style.transform = 'none';
        } else {
            remoteVideo.style.transform = 'none';
            localVideo.style.transform = 'scaleX(-1)';
        }
    };
    init();
</script>
{% endblock %}
