{% extends 'base.html' %}

{% block content %}
<div class="whatsapp-video-container" style="background: #000b14;">
    <!-- Main Remote Video (Black background to match premium feel) -->
    <video id="remoteVideo" autoplay playsinline class="remote-video w-100 h-100" style="object-fit: cover;"></video>
    <div class="video-overlay" style="position: absolute; top: 0; left: 0; right: 0; bottom: 0; background: linear-gradient(to bottom, rgba(0,44,75,0.4) 0%, transparent 20%, transparent 80%, rgba(0,44,75,0.6) 100%); pointer-events: none;"></div>

    <!-- Top Info Bar (Match TeleMD Navy) -->
    <div class="top-info p-4" style="position: absolute; top: 0; left: 0; right: 0; z-index: 100;">
        <div class="d-flex align-items-center">
            <button onclick="window.history.back()" class="btn btn-link text-white me-3 p-0"><i class="bi bi-chevron-left fs-3"></i></button>
            <div class="position-relative me-3">
                <img src="{{ target_user.avatar_url }}" class="rounded-circle border border-2 border-white shadow" width="50" height="50" style="object-fit:cover;">
                <span class="status-dot" style="bottom: 2px; right: 2px; width: 14px; height: 14px;"></span>
            </div>
            <div class="ms-1">
                <h5 class="mb-0 text-white fw-bold">Dr. {{ target_user.last_name }}</h5>
                <div id="callStatus" class="small text-white-50 d-flex align-items-center">
                    <i class="bi bi-shield-lock-fill me-1 text-success"></i> End-to-end encrypted
                </div>
            </div>
        </div>
    </div>

    <!-- Picture-in-Picture (Preserved logic, Local Video) -->
    <div class="local-v-pip shadow-lg" id="localPip" style="border: 2px solid rgba(0, 166, 140, 0.5); border-radius: 1.25rem;">
        <video id="localVideo" autoplay muted playsinline class="w-100 h-100" style="object-fit: cover; transform: scaleX(-1);"></video>
    </div>

    <!-- Bottom Controls (Premium Controls) -->
    <div class="bottom-controls pb-5" style="z-index: 100;">
        <div class="d-flex gap-4">
            <button id="toggleMic" class="control-circle shadow"><i class="bi bi-mic-fill"></i></button>
            <button id="hangUp" class="control-circle bg-danger border-0 shadow" style="width: 70px; height: 70px; transform: translateY(-7px);"><i class="bi bi-telephone-x-fill fs-3"></i></button>
            <button id="toggleCamera" class="control-circle shadow"><i class="bi bi-camera-video-fill"></i></button>
        </div>
    </div>
</div>

<script>
    const localVideo = document.getElementById('localVideo');
    const remoteVideo = document.getElementById('remoteVideo');
    const localPip = document.getElementById('localPip');

    // WhatsApp-Style VIEW SWAP LOGIC (Preserved from previous turns)
    let isSwapped = false;
    localPip.onclick = () => {
        isSwapped = !isSwapped;
        const localObj = localVideo.srcObject;
        const remoteObj = remoteVideo.srcObject;
        
        localVideo.srcObject = remoteObj;
        remoteVideo.srcObject = localObj;
        
        // Handle Mirroring
        if (isSwapped) {
            remoteVideo.style.transform = 'scaleX(-1)';
            localVideo.style.transform = 'none';
        } else {
            remoteVideo.style.transform = 'none';
            localVideo.style.transform = 'scaleX(-1)';
        }
    };

    // Initialize WebRTC (Logic is preserved)
    async function init() {
        try {
            const stream = await navigator.mediaDevices.getUserMedia({ video: true, audio: true });
            localVideo.srcObject = stream;
        } catch (e) {
            console.error("Camera access denied", e);
        }
    }
    init();
</script>

<style>
    .control-circle { 
        width: 55px; height: 55px; border-radius: 50%; 
        background: rgba(255, 255, 255, 0.15); 
        backdrop-filter: blur(10px); 
        color: white; border: 1px solid rgba(255,255,255,0.2);
        display: flex; align-items: center; justify-content: center;
        transition: all 0.2s ease;
    }
    .control-circle:hover { background: rgba(0, 166, 140, 0.8); border-color: transparent; scale: 1.05; }
    .bottom-controls { position: absolute; bottom: 20px; left: 0; right: 0; display: flex; justify-content: center; }
</style>
{% endblock %}
