databases:
  - name: telemed-db
    databaseName: telemed_app
    user: telemed_user
    plan: free

services:
  - type: web
    name: telemedicine-app
    env: python
    plan: free
    buildCommand: "pip install -r requirements.txt && python manage.py collectstatic --no-input && python manage.py migrate"
    startCommand: "daphne core.asgi:application --port $PORT --bind 0.0.0.0"
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: telemed-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: PYTHON_VERSION
        value: 3.10.0
